<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>MonPortfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Manrope:wght@200..800&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="script.js"></script>
</head>

  <body>

  <div id="mainWindow">
    <div id="header">
      <img src="/images/star.png" alt="étoile">
    </div>

    <h1>Anissa Dahabi</h1>
    <h2>Développeuse</h2>

    <div id="mainButtons">
      <div>
        <img onclick="openWindowAPropos()" src="/images/apropos.png" alt="A propos">
        <p>A propos</p>
      </div>

      <div>
        <img onclick="openWindowProjets()" src="/images/dossier1.png" alt="Mes projets">
        <p>Mes projets</p>
      </div>

      <div>
        <img onclick="openWindowExpPro()" src="/images/expPro.png" alt="Expériences professionnelles" id="expProImg">
        <p>Expériences<br>professionnelles</p>
      </div>

      <div>
        <img onclick="openWindowLiens()" src="/images/liens.png" alt="Liens">
        <p>Liens</p>
      </div>

      <div>
        <img onclick="openWindowContact()" src="/images/contact.png" alt="Contact">
        <p>Contact</p>
      </div>
    </div>
  </div>

  <div id="aProposWindow">

      <div class="header">
        <p>A propos</p>
        <img onclick="closeWindowAPropos()" src="/images/closeButton.png" alt="Close Button">
      </div>

  </div>

  <div id="projetsWindow">

      <div class="header">
          <p>Mes projets</p>
          <img onclick="closeWindowProjets()" src="/images/closeButton.png" alt="Close Button">
      </div>

  </div>

  <div id="expProWindow">

      <div class="header">
          <p>Expériences Professionnelles</p>
          <img onclick="closeWindowExpPro()" src="/images/closeButton.png" alt="Close Button">
      </div>

  </div>

  <div id="liensWindow">

      <div class="header">
          <p>Liens utiles</p>
          <img onclick="closeWindowLiens()" src="/images/closeButton.png" alt="Close Button">
      </div>

  </div>

  <div id="contactWindow">

      <div class="header">
          <p>Contact</p>
          <img onclick="closeWindowContact()" src="/images/closeButton.png" alt="Close Button">
      </div>

  </div>

  <footer>
    <p>&#169; Anissa Dahabi 2025</p>
  </footer>

  <img src="/images/bunny.png" alt="bunny image" id="bunny">

  </body>
</html>
